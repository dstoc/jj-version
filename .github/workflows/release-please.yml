name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      jj_version_release_created: ${{ steps.release.outputs['crates/jj-version--release_created'] }}
      jj_version_tag_name: ${{ steps.release.outputs['crates/jj-version--tag_name'] }}
      jj_version_version: ${{ steps.release.outputs['crates/jj-version--version'] }}
      macro_release_created: ${{ steps.release.outputs['crates/jj-version-macro--release_created'] }}
      macro_version: ${{ steps.release.outputs['crates/jj-version-macro--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    needs: release-please
    if: ${{ needs.release-please.outputs.jj_version_release_created == 'true' || needs.release-please.outputs.macro_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      JJ_VERSION_RELEASE_CREATED: ${{ needs.release-please.outputs.jj_version_release_created }}
      JJ_VERSION_TAG_NAME: ${{ needs.release-please.outputs.jj_version_tag_name }}
      JJ_VERSION_VERSION: ${{ needs.release-please.outputs.jj_version_version }}
      MACRO_RELEASE_CREATED: ${{ needs.release-please.outputs.macro_release_created }}
      MACRO_VERSION: ${{ needs.release-please.outputs.macro_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish crates
        shell: bash
        run: |
          set -euo pipefail

          crate_is_published() {
            local crate="$1"
            local version="$2"
            cargo search "$crate" --limit 1 | grep -E "^${crate} = \"${version}\""
          }

          publish_crate() {
            local crate="$1"
            local version="$2"
            local attempts="$3"

            if crate_is_published "$crate" "$version"; then
              echo "$crate $version is already published"
              return 0
            fi

            for attempt in $(seq 1 "$attempts"); do
              echo "Publishing $crate $version (attempt $attempt/$attempts)"
              if cargo publish -p "$crate" --locked; then
                return 0
              fi

              if crate_is_published "$crate" "$version"; then
                echo "$crate $version became visible on crates.io"
                return 0
              fi

              sleep 30
            done

            echo "Failed to publish $crate $version" >&2
            return 1
          }

          if [ "$MACRO_RELEASE_CREATED" = "true" ] || [ "$JJ_VERSION_RELEASE_CREATED" = "true" ]; then
            if [ -z "$MACRO_VERSION" ]; then
              MACRO_VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "jj-version-macro") | .version')"
            fi

            publish_crate jj-version-macro "$MACRO_VERSION" 3
          fi

          if [ "$JJ_VERSION_RELEASE_CREATED" = "true" ]; then
            publish_crate jj-version "$JJ_VERSION_VERSION" 10
          fi

      - name: Publish jj-version GitHub release
        shell: bash
        run: |
          set -euo pipefail

          if [ "$JJ_VERSION_RELEASE_CREATED" = "true" ]; then
            crates_url="https://crates.io/crates/jj-version/${JJ_VERSION_VERSION}"
            notes_file="$(mktemp)"

            gh release view "$JJ_VERSION_TAG_NAME" --json body --jq .body > "$notes_file"
            sed -i '/^## crates.io$/,/^## /{ /^## /!d; /^## crates.io$/d; }' "$notes_file"
            {
              printf '\n## crates.io\n\n'
              printf '%s\n' "$crates_url"
            } >> "$notes_file"

            gh release edit "$JJ_VERSION_TAG_NAME" --notes-file "$notes_file"
            gh release edit "$JJ_VERSION_TAG_NAME" --draft=false
          fi
