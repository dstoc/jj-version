name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.release-please.outputs.version }}
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish crates
        shell: bash
        run: |
          set -euo pipefail

          crate_is_published() {
            local crate="$1"
            cargo search "$crate" --limit 1 | grep -E "^${crate} = \"${VERSION}\""
          }

          publish_crate() {
            local crate="$1"
            local attempts="$2"

            if crate_is_published "$crate"; then
              echo "$crate $VERSION is already published"
              return 0
            fi

            for attempt in $(seq 1 "$attempts"); do
              echo "Publishing $crate $VERSION (attempt $attempt/$attempts)"
              if cargo publish -p "$crate" --locked; then
                return 0
              fi

              if crate_is_published "$crate"; then
                echo "$crate $VERSION became visible on crates.io"
                return 0
              fi

              sleep 30
            done

            echo "Failed to publish $crate $VERSION" >&2
            return 1
          }

          publish_crate jj-version-macro 3
          publish_crate jj-version 10

      - name: Publish GitHub release
        run: gh release edit "$TAG_NAME" --draft=false
